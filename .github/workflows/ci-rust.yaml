# .github/workflows/ci-rust.yaml
name: CI

on:
  schedule:
    # Runs at 08:00 UTC every Monday.
    - cron: 0 8 * * 1
  workflow_dispatch: # Allows manual triggering
  push:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

env:
  # Always display colored outputs.
  CARGO_TERM_COLOR: always

  # Disable incremental compilation for faster from-scratch builds.
  CARGO_INCREMENTAL: 0

  # Disable debug info to reduce the size of `./target`
  CARGO_PROFILE_TEST_DEBUG: 0

  # Set a rust version string for the rustup-cache.
  # Changing this will refresh the cache.
  RUST_VERSION: "1.96"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout the source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Skip post-cleanup.
          persist-credentials: false

      - name: Validate Rust formatting
        # Fail fast with the default version of `rustfmt` installed in the runner.
        run: |
          cargo fmt --version
          cargo fmt --all --check

      - name: Check dependencies, licenses, and audit vulnerabilities
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          log-level: error
          command: check
          arguments: --all-features --workspace


  test:
    name: ${{matrix.name}}
    runs-on: ${{matrix.os}}
    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS

    steps:
      - name: Checkout the source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Skip post-cleanup.
          persist-credentials: false

      - name: Configure variables
        # Set quiet mode by default, except on debug runs.
        run: |
          if [ "$ACTIONS_STEP_DEBUG" != "true" ]; then
            echo "CARGO_TERM_QUIET=true" >> $GITHUB_ENV
          fi

      - name: Show the Rust toolchains
        run: rustup -V && rustup show --verbose

      - name: Cache the Rust toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: rustup-cache
        with:
          path: ~/.rustup
          key: rustup-${{runner.os}}-${{env.RUST_VERSION}}

      - name: Remove unneeded Rust targets on Windows
        # This will prevent `rustup update` to download unneeded targets.
        if: matrix.os == 'windows-latest'
        run: |
          rustup target remove x86_64-pc-windows-gnu || true
          rustup target remove i686-pc-windows-msvc || true

      - name: Update the Rust toolchain
        # Only when the cache was not found.
        if: steps.rustup-cache.outputs.cache-hit != 'true'
        run: rustup update --no-self-update ${RUST_VERSION}

      - name: Set the default Rust toolchain
        run: rustup default ${RUST_VERSION}

      - name: Add Rust components
        # Only when the cache was not found.
        if: steps.rustup-cache.outputs.cache-hit != 'true'
        run: rustup component add rustfmt clippy

      - name: Show the Rust toolchains
        run: rustup -V && rustup show --verbose

      - name: Cache Cargo crates
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: cargo-cache
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            target/
          key: cargo-${{runner.os}}-${{ hashFiles('**/Cargo.lock') }}
          # Use a previous cache image when Cargo.lock was updated, but only on non-main branches.
          # This is to prevent the cached image to grow over time.
          # A fresh cache image is created when this action runs on the main branch.
          restore-keys: ${{ github.ref != 'refs/heads/main' && format('cargo-{0}-', runner.os) || '' }}

      - name: Download all dependencies
        if: steps.cargo-cache.outputs.cache-hit != 'true'
        run: cargo fetch --locked

      - name: Validate rust formatting
        run: cargo fmt --all --check

      # All the next cargo commands are with `--frozen` (--locked and --offline)

      - name: Test
        run: cargo test --frozen --profile ci --all-features --workspace

      - name: Check and lint with Clippy
        run: cargo clippy --frozen --profile ci --all-features --workspace --tests -- -D warnings
